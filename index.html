<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFinder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #000; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.06); --text: #f5f5f7; --text2: #a1a1a6; --text3: #6e6e73; --accent: #0071e3; --success: #30d158; }
body { font-family: -apple-system, 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
.container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
.hero { text-align: center; padding: 100px 40px 60px; }
.hero h1 { font-size: 64px; font-weight: 700; margin-bottom: 16px; background: linear-gradient(135deg, #f5f5f7, #a1a1a6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero p { font-size: 22px; color: var(--text2); }
.filters { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 40px; }
.filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
.filter-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
input, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 14px 16px; font-family: inherit; font-size: 15px; }
input:focus, select:focus { outline: none; border-color: var(--accent); }
input::placeholder { color: var(--text3); }
select option { background: #1a1a1a; color: var(--text); }
.btn { padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 600; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
.btn:hover { background: rgba(255,255,255,0.06); }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; }
.stat-value { font-size: 48px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.stat-label { font-size: 14px; color: var(--text2); }
.ao-list { display: grid; gap: 24px; }
.ao-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 20px; padding: 28px; transition: all 0.3s; }
.ao-card:hover { transform: translateX(8px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.ao-header { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 20px; }
.ao-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.ao-client { color: var(--text2); font-size: 15px; }
.badge { padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 600; background: linear-gradient(135deg, rgba(0,113,227,0.15), rgba(48,209,88,0.15)); color: var(--accent); border: 1px solid rgba(0,113,227,0.3); }
.ao-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 16px; margin-bottom: 20px; }
.meta-item { display: flex; flex-direction: column; gap: 4px; }
.meta-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; }
.meta-value { font-size: 16px; font-weight: 600; color: var(--text); }
.ao-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-weight: 600; }
.ao-link:hover { gap: 12px; }
.loading { text-align: center; padding: 100px; color: var(--text2); }
.spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="hero">
<h1>AOFinder</h1>
<p>Appels d'offres informatique BOAMP</p>
</div>
<div class="container">
<div class="filters">
<div class="filter-grid">
<div class="filter-group"><label>Recherche</label><input type="text" id="search" placeholder="Ex: cloud..." oninput="load()"></div>
<div class="filter-group"><label>Budget min (€)</label><input type="number" id="min" placeholder="50000" oninput="load()"></div>
<div class="filter-group"><label>Budget max (€)</label><input type="number" id="max" placeholder="500000" oninput="load()"></div>
<div class="filter-group"><label>Département</label>
<select id="dept" onchange="load()">
<option value="">Toute la France</option>
<optgroup label="Île-de-France">
<option value="75">75 - Paris</option>
<option value="92">92 - Hauts-de-Seine</option>
<option value="93">93 - Seine-Saint-Denis</option>
<option value="94">94 - Val-de-Marne</option>
<option value="91">91 - Essonne</option>
<option value="78">78 - Yvelines</option>
<option value="77">77 - Seine-et-Marne</option>
<option value="95">95 - Val-d'Oise</option>
</optgroup>
<optgroup label="Grand Est">
<option value="67">67 - Bas-Rhin</option>
<option value="68">68 - Haut-Rhin</option>
<option value="54">54 - Meurthe-et-Moselle</option>
<option value="57">57 - Moselle</option>
<option value="51">51 - Marne</option>
<option value="08">08 - Ardennes</option>
</optgroup>
<optgroup label="Autres">
<option value="69">69 - Rhône</option>
<option value="33">33 - Gironde</option>
<option value="31">31 - Haute-Garonne</option>
<option value="13">13 - Bouches-du-Rhône</option>
<option value="59">59 - Nord</option>
<option value="44">44 - Loire-Atlantique</option>
</optgroup>
</select>
</div>
</div>
<button class="btn" onclick="reset()">Réinitialiser</button>
</div>
<div class="stats">
<div class="stat-card"><div class="stat-value" id="tot">-</div><div class="stat-label">AO</div></div>
<div class="stat-card"><div class="stat-value" id="bud">0 €</div><div class="stat-label">Budget</div></div>
<div class="stat-card"><div class="stat-value" id="rec">-</div><div class="stat-label">MAJ</div></div>
</div>
<div id="res"></div>
</div>
<script>
let data = [];
let timer;

async function load() {
  clearTimeout(timer);
  timer = setTimeout(async () => {
    const s = document.getElementById('search').value;
    const d = document.getElementById('dept').value;
    const min = document.getElementById('min').value || 0;
    const max = document.getElementById('max').value || 999999999;
    const c = document.getElementById('res');
    
    c.innerHTML = '<div class="loading"><div class="spinner"></div><p>Chargement...</p></div>';
    
    try {
      const params = new URLSearchParams({search: s, dept: d, min, max});
      const r = await fetch('/api/ao?' + params);
      const json = await r.json();
      
      if (json.error) throw new Error(json.message);
      
      data = json.results || [];
      display();
      
    } catch (e) {
      c.innerHTML = `<div class="loading"><h3>Erreur</h3><p>${e.message}</p><button class="btn" onclick="load()" style="margin-top:20px;">Réessayer</button></div>`;
    }
  }, 300);
}

function display() {
  const c = document.getElementById('res');
  if (!data.length) {
    c.innerHTML = '<div class="loading"><h3>Aucun AO trouvé</h3></div>';
    document.getElementById('tot').textContent = '0';
    document.getElementById('bud').textContent = '0 €';
    return;
  }
  
  let h = '<div class="ao-list">';
  data.forEach(ao => {
    const loc = [ao.region, ao.dept + ' - ' + ao.deptName, ao.commune].filter(x => x && x !== 'France').join(' · ') || 'France';
    h += `<div class="ao-card">
      <div class="ao-header">
        <div><div class="ao-title">${ao.title}</div><div class="ao-client">📍 ${ao.client}</div></div>
        <div class="badge">📡 ${ao.source}</div>
      </div>
      <div class="ao-meta">
        <div class="meta-item"><div class="meta-label">Ref</div><div class="meta-value">${ao.id}</div></div>
        <div class="meta-item"><div class="meta-label">Budget</div><div class="meta-value">${ao.budget > 0 ? fmt(ao.budget) : 'N/C'}</div></div>
        <div class="meta-item"><div class="meta-label">Deadline</div><div class="meta-value">${fmtD(ao.deadline)}</div></div>
        <div class="meta-item"><div class="meta-label">Localisation</div><div class="meta-value">${loc}</div></div>
      </div>
      <a href="${ao.url}" target="_blank" class="ao-link">Voir l'annonce <span>→</span></a>
    </div>`;
  });
  h += '</div>';
  c.innerHTML = h;
  
  document.getElementById('tot').textContent = data.length;
  document.getElementById('bud').textContent = fmt(data.reduce((s, a) => s + a.budget, 0));
  document.getElementById('rec').textContent = new Date().toLocaleDateString('fr-FR');
}

function reset() {
  document.getElementById('search').value = '';
  document.getElementById('min').value = '';
  document.getElementById('max').value = '';
  document.getElementById('dept').value = '';
  load();
}

function fmt(n) { return new Intl.NumberFormat('fr-FR', {style: 'currency', currency: 'EUR', maximumFractionDigits: 0}).format(n); }
function fmtD(d) { if (!d || d === 'N/A') return 'N/A'; try { return new Date(d).toLocaleDateString('fr-FR'); } catch { return d; } }

window.onload = () => load();
</script>
</body>
</html>
