<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFinder — Appels d'Offres Informatique</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root, [data-theme="dark"] {
  --bg: #050508; --bg2: #0d0d12;
  --surface: rgba(255,255,255,0.04); --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5; --text2: #9898a8; --text3: #5a5a6e;
  --accent: #2b8aff; --accent2: #0057cc; --success: #34d368; --shadow: rgba(0,0,0,0.6);
  --bubble-ref-bg: rgba(255,255,255,0.05); --bubble-ref-border: rgba(255,255,255,0.1); --bubble-ref-text: #9898a8;
  --bubble-deadline-bg: rgba(52,211,104,0.1); --bubble-deadline-border: rgba(52,211,104,0.28); --bubble-deadline-text: #34d368;
  --bubble-location-bg: rgba(43,138,255,0.1); --bubble-location-border: rgba(43,138,255,0.28); --bubble-location-text: #5ea8ff;
  --toggle-bg: rgba(255,255,255,0.06); --toggle-border: rgba(255,255,255,0.1); --toggle-text: #9898a8;
  --card-glow: rgba(43,138,255,0.06);
}
[data-theme="light"] {
  --bg: #f0f0f5; --bg2: #ffffff;
  --surface: rgba(255,255,255,0.75); --surface-hover: rgba(255,255,255,0.95);
  --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.12);
  --text: #18181c; --text2: #4a4a5a; --text3: #8a8a9a;
  --accent: #1a6fe8; --accent2: #0050bb; --success: #1a8a3d; --shadow: rgba(0,0,0,0.1);
  --bubble-ref-bg: rgba(0,0,0,0.04); --bubble-ref-border: rgba(0,0,0,0.1); --bubble-ref-text: #4a4a5a;
  --bubble-deadline-bg: rgba(26,138,61,0.07); --bubble-deadline-border: rgba(26,138,61,0.2); --bubble-deadline-text: #1a8a3d;
  --bubble-location-bg: rgba(26,111,232,0.07); --bubble-location-border: rgba(26,111,232,0.2); --bubble-location-text: #1a6fe8;
  --toggle-bg: rgba(0,0,0,0.05); --toggle-border: rgba(0,0,0,0.1); --toggle-text: #4a4a5a;
  --card-glow: rgba(26,111,232,0.05);
}

[data-theme="light"] .ao-card {
  background: #ffffff;
  border-color: rgba(0,0,0,0.08);
  box-shadow: 0 2px 16px rgba(0,0,0,0.07), 0 0 0 0.5px rgba(0,0,0,0.05);
}
[data-theme="light"] .ao-card:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  border-color: rgba(26,111,232,0.25);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── BACKGROUND ── */
.bg-gradient {
  position: fixed; top: -50%; left: -50%; right: -50%; bottom: -50%;
  width: 200%; height: 200vh;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(43,138,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(52,211,104,0.05) 0%, transparent 45%),
    radial-gradient(ellipse at 60% 50%, rgba(120,60,255,0.04) 0%, transparent 40%);
  animation: gradientShift 25s ease infinite;
  z-index: 0; pointer-events: none;
}
[data-theme="light"] .bg-gradient {
  background:
    radial-gradient(ellipse at 30% 20%, rgba(26,111,232,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(26,138,61,0.03) 0%, transparent 45%);
}
@keyframes gradientShift {
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(-4%,-3%) scale(1.02)}
  66%{transform:translate(3%,2%) scale(0.98)}
}

/* ── THEME TOGGLE ── */
.theme-toggle {
  position: fixed; top: 20px; left: 20px; z-index: 999;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  background: var(--toggle-bg);
  border: 1px solid var(--toggle-border);
  border-radius: 100px;
  cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--toggle-text);
  backdrop-filter: blur(24px);
  transition: all 0.2s; user-select: none;
}
.theme-toggle:hover { background: var(--surface-hover); border-color: var(--border2); color: var(--text); transform: scale(1.04); }
.theme-toggle .icon { font-size: 15px; transition: transform 0.5s cubic-bezier(.34,1.56,.64,1); }
.theme-toggle:hover .icon { transform: rotate(25deg) scale(1.1); }

/* ── LAYOUT ── */
.container { max-width: 1400px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 1; }

/* ── HERO ── */
.hero { text-align: center; padding: 110px 40px 72px; }
.hero h1 {
  font-size: 80px; font-weight: 800; letter-spacing: -0.035em;
  margin-bottom: 16px;
  background: linear-gradient(145deg, var(--text) 0%, var(--text2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: fadeIn 0.7s ease;
}
.hero p { font-size: 22px; color: var(--text2); font-weight: 400; margin-bottom: 20px; letter-spacing: -0.01em; animation: fadeIn 0.7s ease 0.1s both; }
.sources-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 7px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px; font-size: 13px; color: var(--text3);
  backdrop-filter: blur(40px);
  animation: fadeIn 0.7s ease 0.2s both;
  letter-spacing: 0.01em;
}
.live { width: 7px; height: 7px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); animation: pulse 2.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

/* ── FILTERS ── */
.filters {
  background: var(--surface);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 32px;
  margin-bottom: 36px;
  animation: fadeIn 0.7s ease 0.3s both;
  transition: background 0.3s, border-color 0.3s;
}
.filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; margin-bottom: 20px; }
.filter-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text3); margin-bottom: 7px; letter-spacing: 0.06em; text-transform: uppercase; }
input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px; color: var(--text);
  padding: 13px 16px; font-family: inherit; font-size: 15px;
  transition: all 0.2s; outline: none;
}
[data-theme="light"] input { background: rgba(255,255,255,0.7); }
input:focus { background: rgba(43,138,255,0.05); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(43,138,255,0.12); }
input::placeholder { color: var(--text3); }
.btn {
  padding: 13px 26px; border-radius: 12px;
  font-size: 14px; font-weight: 600;
  border: 1px solid var(--border2);
  cursor: pointer; transition: all 0.2s;
  font-family: inherit; background: var(--surface); color: var(--text);
}
.btn:hover { background: var(--surface-hover); transform: translateY(-1px); }

/* ── STATS ── */
.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 44px; animation: fadeIn 0.7s ease 0.4s both; }
.stat-card {
  background: var(--surface);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border);
  border-radius: 18px; padding: 28px 32px;
  transition: all 0.3s; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--success));
  opacity: 0; transition: opacity 0.3s;
}
.stat-card:hover { transform: translateY(-5px); box-shadow: 0 16px 48px var(--shadow); }
.stat-card:hover::before { opacity: 1; }
.stat-value {
  font-size: 52px; font-weight: 800; letter-spacing: -0.04em;
  background: linear-gradient(135deg, var(--text) 30%, var(--text2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px; font-variant-numeric: tabular-nums;
}
.stat-label { font-size: 13px; color: var(--text3); font-weight: 500; letter-spacing: 0.02em; }

/* ── AO CARDS ── */
.ao-list { display: grid; gap: 16px; }

.ao-card {
  background: var(--surface);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 26px 28px 26px 34px;
  transition: transform 0.3s cubic-bezier(.22,1,.36,1), box-shadow 0.3s ease, border-color 0.3s;
  position: relative; overflow: hidden;
  box-shadow: 0 1px 8px var(--shadow);
}

/* Accent bar gauche */
.ao-card::after {
  content: ''; position: absolute; top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(180deg, var(--accent) 0%, var(--success) 100%);
  opacity: 0.3; transition: opacity 0.3s;
  border-radius: 18px 0 0 18px;
}

/* Glow hover */
.ao-card::before {
  content: ''; position: absolute; inset: 0;
  background: var(--card-glow);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
  border-radius: 18px;
}

.ao-card:hover {
  transform: translateX(5px) translateY(-3px);
  box-shadow: 0 16px 48px var(--shadow);
  border-color: rgba(43,138,255,0.22);
}
.ao-card:hover::after { opacity: 0.9; }
.ao-card:hover::before { opacity: 1; }

.ao-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 16px; }
.ao-title { font-size: 18px; font-weight: 650; letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.35; color: var(--text); }
.ao-client { color: var(--text2); font-size: 14px; display: flex; align-items: center; gap: 5px; }
.badge {
  padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 600;
  white-space: nowrap;
  background: linear-gradient(135deg, rgba(43,138,255,0.14), rgba(52,211,104,0.1));
  color: var(--accent); border: 1px solid rgba(43,138,255,0.25);
  letter-spacing: 0.01em;
}
.badge-ted { background: linear-gradient(135deg, rgba(255,181,71,0.14), rgba(255,100,0,0.1)); color: #ffb547; border-color: rgba(255,181,71,0.35); }

/* ── BUBBLES ── */
.ao-bubbles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.bubble {
  display: flex; flex-direction: column; gap: 3px;
  padding: 9px 14px; border-radius: 12px; border: 1px solid;
  transition: transform 0.2s, box-shadow 0.2s;
  min-width: 90px;
}
.bubble:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
.bubble-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.65; }
.bubble-val { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.bubble-ref { background: var(--bubble-ref-bg); border-color: var(--bubble-ref-border); color: var(--bubble-ref-text); }
.bubble-deadline { background: var(--bubble-deadline-bg); border-color: var(--bubble-deadline-border); color: var(--bubble-deadline-text); }
.bubble-location { background: var(--bubble-location-bg); border-color: var(--bubble-location-border); color: var(--bubble-location-text); }

.ao-link { display: inline-flex; align-items: center; gap: 7px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; transition: all 0.2s; }
.ao-link:hover { gap: 11px; opacity: 0.85; }
.ao-no-link { color: var(--text3); font-size: 13px; }

/* ── ACCORDION ── */
.ao-toggle-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 14px; border-radius: 100px;
  border: 1px solid var(--border2);
  background: var(--surface); color: var(--text2);
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
  letter-spacing: 0.01em;
}
.ao-toggle-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--accent); }
.ao-desc-wrap { display: none; margin-top: 14px; }
.ao-desc {
  color: var(--text2); line-height: 1.75; font-size: 13.5px;
  padding: 14px 18px;
  background: rgba(43,138,255,0.04);
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
}
.ao-footer { display: flex; align-items: center; gap: 14px; margin-top: 16px; flex-wrap: wrap; }

/* ── LOADING ── */
.loading { text-align: center; padding: 90px 40px; }
.spinner {
  width: 52px; height: 52px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  margin: 0 auto 20px;
  box-shadow: 0 0 20px rgba(43,138,255,0.15);
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading h3 { color: var(--text); font-size: 19px; margin-bottom: 8px; font-weight: 600; }
.loading-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.progress-outer { width: 280px; max-width: 80vw; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 10px; overflow: hidden; }
.progress-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 4px; width: 0%; transition: width 0.3s ease; box-shadow: 0 0 10px rgba(43,138,255,0.4); }
.progress-label { font-size: 12px; color: var(--text3); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--bg2, var(--surface));
  backdrop-filter: blur(40px);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 16px 24px;
  box-shadow: 0 12px 48px var(--shadow);
  transform: translateY(100px) scale(0.95);
  opacity: 0; transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
  z-index: 1000; font-size: 14px; font-weight: 500; color: var(--text);
}
.toast.show { transform: translateY(0) scale(1); opacity: 1; }

/* ── MISC ── */
@keyframes fadeIn { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
.load-more { text-align: center; padding: 36px; }
.load-more .btn {
  background: var(--accent); color: white; border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(43,138,255,0.3);
}
.load-more .btn:hover { background: var(--accent2); box-shadow: 0 8px 28px rgba(43,138,255,0.4); }

@media (max-width: 768px) {
  .hero h1 { font-size: 52px; } .hero p { font-size: 18px; } .container { padding: 0 18px; }
  .filters { padding: 20px; } .filter-grid { grid-template-columns: 1fr; }
  .ao-header { flex-direction: column; } .stat-value { font-size: 40px; }
  .ao-bubbles { gap: 7px; } .bubble { min-width: 76px; padding: 7px 11px; }
  .theme-toggle { top: 14px; left: 14px; padding: 8px 14px; font-size: 12px; }
}
</style>
</head>

<div class="bg-gradient"></div>

<div class="hero">

function estIT(titre, desc) {
  const t = (titre||'').toLowerCase(), d = (desc||'').toLowerCase();
  const exclu = ['urbanisme','géotechnique','pollution','essai de sol','plu','plan local','impression papier','imprimerie','routage courrier','brochure papier','flyer','catalogue papier','mise sous pli','reprographie','ascenseur','monte-charge','nettoyage','propreté','restauration','repas','cantine','alimentaire','denrée','gardiennage','surveillance','espaces verts','jardin','déchets','ordures','bac à graisse','assainissement','eaux usées','eaux pluviales','bâtiment','construction','travaux','maçonnerie','plomberie','chauffage','climatisation','menuiserie','peinture','carrelage','transport','véhicule','car scolaire','bus','voirie','route','signalisation','aménagement urbain','diagnostic sol','étude géologique','mobilité verticale','microbiologique','analyses bactériologiques','fourniture papier','fourniture bureau non informatique'];
  for (let m of exclu) { if (t.includes(m)||d.includes(m)) return false; }
  const it = ['ibmi','as/400','as400','rpg','cobol','iseries','db2 400','java','j2ee','spring','hibernate','.net','c#','asp.net','dotnet','php','symfony','laravel','python','django','flask','serveur','cloud','azure','aws','google cloud','gcp','infrastructure informatique','parc informatique','datacenter','hébergement','virtualisation','vmware','hyper-v','devops','ci/cd','jenkins','gitlab','github','docker','kubernetes','terraform','ansible','site web','application web','portail web','développement web','react','angular','vue.js','node.js','base de données','sql','oracle','mysql','postgresql','data engineer','big data','business intelligence','analytics','réseau informatique','switch','routeur','wifi','firewall','téléphonie ip','voip','cybersécurité','cyber','sécurité informatique','antivirus','pare-feu','sauvegarde informatique','backup','erp','crm','sirh','ged électronique','gmao','sap','salesforce','odoo','système d\'information','architecture si','schéma directeur','maintenance informatique','support informatique','infogérance','tma','tierce maintenance','mco','poste de travail','ordinateur','matériel informatique','équipement informatique','imprimante réseau','copieur réseau','microsoft','office 365','windows server','adobe','autocad','dématérialisation','signature électronique','archivage électronique','transformation digitale','numérique','logiciel','software','progiciel','application','plateforme web','solution logicielle','formation informatique','certification informatique'];
  for (let m of it) { if (t.includes(m)) return true; }
  return false;
}



async function loadAO() {
  if (isLoading) return;
  isLoading = true;
  const container = document.getElementById('res');
  const queriesIT = [
      // ── LOGICIELS (haut rendement) ──
      'logiciel','software OR progiciel','application informatique OR solution logicielle',
      'solution SaaS OR plateforme numerique',

      // ── IBM i / AS400 ──
      'ibmi OR as400','iseries OR rpg OR cobol','db2 400',

      // ── LANGAGES ──
      'java OR spring OR springboot','dotnet OR php OR symfony',
      'laravel OR python OR django','react OR angular OR nodejs',
      'typescript OR golang OR scala',

      // ── WEB & MOBILE ──
      'site web OR application web OR portail web','developpement web OR refonte site',
      'application mobile OR iOS OR android','intranet OR extranet',

      // ── INFRA & CLOUD ──
      'serveur informatique OR infrastructure informatique',
      'cloud computing OR cloud public OR cloud prive',
      'azure OR microsoft azure','aws OR amazon web services',
      'google cloud OR GCP OR OVHcloud',
      'datacenter OR hebergement informatique',
      'virtualisation OR vmware OR hyper-v',
      'conteneur OR docker OR kubernetes',
      'microservices OR devops',

      // ── CI/CD & DEVOPS ──
      'CI/CD OR jenkins OR gitlab','terraform OR ansible OR github actions',

      // ── CYBERSECURITE ──
      'cybersecurite OR securite informatique',
      'firewall OR pare-feu OR antivirus',
      'SIEM OR SOC OR pentest',
      'conformite RGPD OR ISO 27001',
      'sauvegarde informatique OR backup OR PRA',
      'zero trust OR SecNumCloud',

      // ── RESEAUX ──
      'reseau informatique OR switch OR routeur',
      'wifi OR WLAN OR borne wifi',
      'telephonie IP OR VOIP OR IPBX',
      'VPN OR fibre optique OR SD-WAN',

      // ── DATA & BI ──
      'base de donnees OR SGBD OR SQL',
      'oracle OR mysql OR postgresql',
      'Business Intelligence OR BI OR reporting',
      'data warehouse OR data lake OR big data',
      'data engineer OR data analyst OR data science',
      'machine learning OR IA OR intelligence artificielle',
      'power BI OR tableau OR qlik',
      'ETL OR ELT OR pipeline donnees',

      // ── ERP / METIER ──
      'ERP OR CRM','SIRH OR RH informatique',
      'SAP OR salesforce OR odoo',
      'GMAO OR CMMS OR GED',
      'dematerialisation OR signature electronique',
      'archivage electronique OR coffre-fort numerique',
      'workflow OR BPM OR messagerie electronique',

      // ── SI ──
      'systeme information OR schema directeur',
      'architecture SI OR transformation digitale',
      'audit informatique OR MOA informatique OR MOE informatique',

      // ── MATERIEL ──
      'ordinateur OR poste de travail',
      'serveur rack OR baie serveur',
      'imprimante reseau OR scanner reseau',
      'equipement reseau OR NAS OR SAN',

      // ── SERVICES IT ──
      'maintenance informatique OR support informatique',
      'infogerance OR tierce maintenance OR TMA',
      'MCO OR helpdesk OR service desk',
      'assistance technique informatique OR regie informatique',

      // ── LICENCES ──
      'Microsoft OR Office 365 OR Windows server',
      'licence logiciel OR abonnement SaaS',
      'adobe OR autodesk OR vmware',
      'linux OR open source OR red hat',

      // ── FORMATION ──
      'formation informatique OR formation developpement',
      'formation cybersecurite OR formation cloud',
      'certification AWS OR azure certification OR e-learning',

      // ── RPA & IA ──
      'RPA OR robotic process automation OR UiPath',
      'chatbot OR agent conversationnel OR NLP',
      'LLM OR IA generative OR RAG',

      // ── SUPERVISION ──
      'ITSM OR ITIL OR supervision informatique',
      'monitoring OR Zabbix OR Grafana',
      'API management OR ESB OR middleware',

      // ── SECTEUR PUBLIC ──
      'numerique OR informatique',
      'SI collectivite OR informatique commune',
      'informatique hopital OR SI hospitalier',
      'portail citoyen OR teleprocedure OR dematerialisation',
      'SI ecole OR ENT OR numerique educatif',
      'HDS OR hebergeur donnees sante OR UGAP',

      // ── AUTRES ──
      'IoT OR internet des objets OR blockchain',
      'jumeau numerique OR edge computing',
      'MDM OR VDI OR Citrix OR bureau virtuel',
      'PKI OR certificat SSL OR DLP',
      'GLPI OR JIRA OR CMDB OR ticketing',
      'geolocalisation OR SIG OR cartographie',
      'SharePoint OR Teams OR visioconference'
    ];
  container.innerHTML = '<div class="loading"><div class="spinner"></div><h3>Chargement en cours...</h3><p id="prog-lbl" style="margin-top:8px;color:var(--text3);font-size:14px;">Connexion à BOAMP...</p><div style="width:320px;max-width:80vw;height:5px;background:var(--border2);border-radius:5px;margin:16px auto 0;overflow:hidden"><div id="prog-bar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:5px;transition:width 0.3s ease"></div></div></div>';
  try {
    let allResults = [];
    const searchTerm = document.getElementById('search').value.trim();
    if (searchTerm) {
      const params = new URLSearchParams({dataset:'boamp', q:searchTerm, rows:1000, sort:'dateparution'});
      const resp = await fetch(API_BASE + '?' + params);
      const data = await resp.json();
      if (data.records) allResults = data.records;
    } else {
      // Toutes les requêtes en parallèle = vitesse maximale
      const lbl = document.getElementById('prog-lbl');
      const bar = document.getElementById('prog-bar');
      if (lbl) lbl.textContent = 'Envoi de ' + queriesIT.length + ' requêtes...';
      let done = 0;
      const allResultsArr = await Promise.all(queriesIT.map(async q => {
        try {
          const p = new URLSearchParams({dataset:'boamp', q:q, rows:200, sort:'dateparution'});
          const r = await fetch(API_BASE + '?' + p);
          const d = await r.json();
          done++;
          if (bar) bar.style.width = Math.round(done / queriesIT.length * 100) + '%';
          if (lbl) lbl.textContent = 'Requêtes : ' + done + ' / ' + queriesIT.length;
          return d.records || [];
        } catch { done++; return []; }
      }));
      allResultsArr.forEach(r => allResults = allResults.concat(r));
      const seen = new Set();
      allResults = allResults.filter(r => {
        const id = r.fields.idweb || r.recordid;
        if (seen.has(id)) return false;
        seen.add(id); return true;
      });
    }
    if (!allResults.length) {
      container.innerHTML = '<div class="loading"><h3>Aucun résultat</h3></div>';
      toast('⚠️ Aucun résultat'); return;
    }
    allAO = allResults.map(rec => {
      const f = rec.fields;
      const dept = (f.departement||f.dept||f.code_departement||f.departements||'').toString().trim();
      const commune = (f.commune||f.ville||f.localite||f.lieu_execution||'').toString().trim();
      const codeDept = dept.length > 0 ? dept.padStart(dept.length <= 2 ? 2 : 3, '0') : '';
      let location = 'France';
      if (codeDept) {
        if (DOMTOM[codeDept]) {
          location = DOMTOM[codeDept] + (commune ? ' · ' + commune : '');
        } else {
          const parts = [];
          if (REGIONS[codeDept]) parts.push(REGIONS[codeDept]);
          if (DEPT_NAMES[codeDept]) parts.push(DEPT_NAMES[codeDept]);
          else if (codeDept) parts.push(codeDept);
          if (commune) parts.push(commune);
          if (parts.length) location = parts.join(' · ');
        }
      } else if (commune) location = commune;
      const idweb = f.idweb;
      const url = f.urlannonce || (idweb ? 'https://www.boamp.fr/avis/detail/' + idweb : null);
      return {
        id: idweb || 'N/A', title: f.objet || 'Sans titre',
        client: f.denominationsociale || f.nomentite || 'Non spécifié',
        deadline: f.datelimitereponse || 'N/A', location,
        description: (f.descriptionlots || f.objetmarche || '').substring(0, 200),
        url, source: 'BOAMP'
      };
    }).filter(ao => estIT(ao.title, ao.description));

    // Tri par deadline (les plus urgents en premier, N/A à la fin)
    
    displayed = 0; displayAO(); updateStats(allAO.length);
    toast('✓ ' + allAO.length + ' AO informatique');
  } catch(e) {
    console.error(e);
    container.innerHTML = '<div class="loading"><h3>⚠️ Erreur BOAMP</h3></div>';
    toast('⚠️ Erreur de connexion');
  } finally { isLoading = false; }
}

function displayAO() {
  const container = document.getElementById('res');
  const search = document.getElementById('search').value.toLowerCase().trim();
  const filtered = allAO.filter(ao => {
    if (search && !ao.title.toLowerCase().includes(search) && !ao.description.toLowerCase().includes(search) && !ao.client.toLowerCase().includes(search)) return false;
    return true;
  });
  if (!filtered.length) {
    container.innerHTML = '<div class="loading"><h3>Aucun AO trouvé</h3></div>';
    document.getElementById('tot').textContent = '0'; return;
  }
  const start = displayed, end = Math.min(displayed + PER_PAGE, filtered.length);
  const toShow = filtered.slice(start, end);
  displayed = end;
  let listEl = container.querySelector('.ao-list');
  if (start === 0) { container.innerHTML = '<div class="ao-list"></div>'; listEl = container.querySelector('.ao-list'); }
  const old = container.querySelector('.load-more');
  if (old) old.remove();
  toShow.forEach(ao => {
    const card = document.createElement('div');
    card.className = 'ao-card';
    const id = 'desc-' + Math.random().toString(36).slice(2,9);
    const hdr = document.createElement('div'); hdr.className = 'ao-header';
    const badgeClass = ao.source === 'TED' ? 'badge badge-ted' : 'badge';
    const badgeIcon = ao.source === 'TED' ? '🇪🇺' : '📡';
    hdr.innerHTML = '<div><div class="ao-title">' + ao.title + '</div><div class="ao-client">🏢 ' + ao.client + '</div></div><div class="' + badgeClass + '">' + badgeIcon + ' ' + ao.source + '</div>';
    card.appendChild(hdr);
    const bub = document.createElement('div'); bub.className = 'ao-bubbles';
    bub.innerHTML = '<div class="bubble bubble-ref"><span class="bubble-label">REF</span><span class="bubble-val">' + ao.id + '</span></div>' +
      '<div class="bubble bubble-deadline"><span class="bubble-label">📅 DEADLINE</span><span class="bubble-val">' + fmtD(ao.deadline) + '</span></div>' +
      '<div class="bubble bubble-location"><span class="bubble-label">📍 LIEU</span><span class="bubble-val">' + ao.location + '</span></div>';
    card.appendChild(bub);
    const ftr = document.createElement('div'); ftr.className = 'ao-footer';
    if (ao.description) {
      const btn = document.createElement('button'); btn.className = 'ao-toggle-btn'; btn.id = 'btn-' + id;
      btn.innerHTML = '<span class="ao-arrow">▼</span> <span class="ao-label">Objet du marché</span>';
      btn.setAttribute('onclick', 'toggleDesc("' + id + '")'); ftr.appendChild(btn);
    }
    if (ao.url) {
      const a = document.createElement('a'); a.href = ao.url; a.target = '_blank'; a.rel = 'noopener';
      a.className = 'ao-link'; a.textContent = "Voir l'annonce →"; ftr.appendChild(a);
    } else {
      const s = document.createElement('span'); s.className = 'ao-no-link'; s.textContent = 'Lien non disponible'; ftr.appendChild(s);
    }
    card.appendChild(ftr);
    if (ao.description) {
      const wrap = document.createElement('div'); wrap.className = 'ao-desc-wrap'; wrap.id = 'wrap-' + id;
      wrap.innerHTML = '<div class="ao-desc-inner"><div class="ao-desc">' + ao.description + '</div></div>';
      card.appendChild(wrap);
    }
    listEl.appendChild(card);
  });
  if (displayed < filtered.length) {
    const lm = document.createElement('div'); lm.className = 'load-more';
    lm.innerHTML = '<button class="btn" onclick="displayAO()">Charger plus (' + (filtered.length - displayed) + ' restants)</button>';
    container.appendChild(lm);
  }
  document.getElementById('tot').textContent = filtered.length.toLocaleString('fr-FR');
}

function updateStats(total) {
  document.getElementById('tot').textContent = total.toLocaleString('fr-FR');
  document.getElementById('rec').textContent = new Date().toLocaleDateString('fr-FR');
}
function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { displayed = 0; displayAO(); }, 400); }
function reset() { document.getElementById('search').value = ''; displayed = 0; loadAO(); }
function fmtD(d) { if (!d || d === 'N/A') return 'N/A'; try { return new Date(d).toLocaleDateString('fr-FR'); } catch { return d; } }
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 4000); }
function toggleDesc(id) {
  var wrap = document.getElementById('wrap-' + id), btn = document.getElementById('btn-' + id);
  if (!wrap || !btn) return;
  if (wrap.style.display === 'block') {
    wrap.style.display = 'none';
    btn.innerHTML = '<span class="ao-arrow">▼</span> <span class="ao-label">Objet du marché</span>';
  } else {
    wrap.style.display = 'block';
    btn.innerHTML = '<span class="ao-arrow">▲</span> <span class="ao-label">Masquer</span>';
  }
}
window.onload = () => loadAO();
</script>

<script>
function toggleTheme() {
  const html = document.documentElement, isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isDark ? 'Mode sombre' : 'Mode clair';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  if (saved === 'light') { document.getElementById('themeIcon').textContent = '🌙'; document.getElementById('themeLabel').textContent = 'Mode sombre'; }
})();
</script>
