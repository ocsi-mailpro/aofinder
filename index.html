<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFinder — Appels d'Offres Informatique</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── DARK THEME (défaut) ── */
:root, [data-theme="dark"] {
  --bg: #000;
  --bg2: #0a0a0a;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #f5f5f7;
  --text2: #a1a1a6;
  --text3: #6e6e73;
  --accent: #0071e3;
  --success: #30d158;
  --shadow: rgba(0,0,0,0.5);

  /* Bulles */
  --bubble-ref-bg:      rgba(255,255,255,0.05);
  --bubble-ref-border:  rgba(255,255,255,0.1);
  --bubble-ref-text:    #a1a1a6;

  --bubble-budget-bg:      rgba(255,181,71,0.1);
  --bubble-budget-border:  rgba(255,181,71,0.25);
  --bubble-budget-text:    #ffb547;

  --bubble-deadline-bg:      rgba(48,209,88,0.1);
  --bubble-deadline-border:  rgba(48,209,88,0.25);
  --bubble-deadline-text:    #30d158;

  --bubble-location-bg:      rgba(0,113,227,0.1);
  --bubble-location-border:  rgba(0,113,227,0.25);
  --bubble-location-text:    #4da3ff;

  /* Toggle */
  --toggle-bg: rgba(255,255,255,0.07);
  --toggle-border: rgba(255,255,255,0.12);
  --toggle-text: #a1a1a6;
  --toggle-icon: "☀️";
}

/* ── LIGHT THEME ── */
[data-theme="light"] {
  --bg: #f2f2f7;
  --bg2: #ffffff;
  --surface: rgba(255,255,255,0.7);
  --surface-hover: rgba(255,255,255,0.9);
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1d1d1f;
  --text2: #515154;
  --text3: #86868b;
  --accent: #0071e3;
  --success: #1a7f37;
  --shadow: rgba(0,0,0,0.12);

  --bubble-ref-bg:      rgba(0,0,0,0.04);
  --bubble-ref-border:  rgba(0,0,0,0.1);
  --bubble-ref-text:    #515154;

  --bubble-budget-bg:      rgba(180,100,0,0.07);
  --bubble-budget-border:  rgba(180,100,0,0.2);
  --bubble-budget-text:    #b46000;

  --bubble-deadline-bg:      rgba(26,127,55,0.07);
  --bubble-deadline-border:  rgba(26,127,55,0.2);
  --bubble-deadline-text:    #1a7f37;

  --bubble-location-bg:      rgba(0,113,227,0.07);
  --bubble-location-border:  rgba(0,113,227,0.2);
  --bubble-location-text:    #0055b3;

  --toggle-bg: rgba(0,0,0,0.06);
  --toggle-border: rgba(0,0,0,0.1);
  --toggle-text: #515154;
}

/* Light mode: cartes blanches avec ombre marquée */
[data-theme="light"] .ao-card {
  background: #ffffff;
  border-color: rgba(0,0,0,0.1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
[data-theme="light"] .ao-card:hover {
  box-shadow: 0 16px 40px rgba(0,0,0,0.14);
  border-color: rgba(0,113,227,0.3);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── BACKGROUND GRADIENT ── */
.bg-gradient {
  position: fixed;
  top: -50%; left: -50%; right: -50%; bottom: -50%;
  width: 200%; height: 200vh;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,113,227,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(48,209,88,0.06) 0%, transparent 40%);
  animation: gradientShift 20s ease infinite;
  z-index: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
[data-theme="light"] .bg-gradient {
  background:
    radial-gradient(circle at 50% 50%, rgba(0,113,227,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(48,209,88,0.03) 0%, transparent 40%);
}
@keyframes gradientShift {
  0%,100% { transform: translate(0,0); }
  50%     { transform: translate(-10%,-10%); }
}

/* ── TOGGLE MODE ── */
.theme-toggle {
  position: fixed;
  top: 20px; left: 20px;
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--toggle-bg);
  border: 1px solid var(--toggle-border);
  border-radius: 100px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--toggle-text);
  backdrop-filter: blur(20px);
  transition: all 0.25s;
  user-select: none;
}
.theme-toggle:hover {
  background: var(--surface-hover);
  border-color: var(--border2);
  color: var(--text);
  transform: scale(1.03);
}
.theme-toggle .icon { font-size: 16px; transition: transform 0.4s; }
.theme-toggle:hover .icon { transform: rotate(20deg); }

/* ── LAYOUT ── */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 40px;
  position: relative;
  z-index: 1;
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 120px 40px 80px;
}
.hero h1 {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeIn 0.8s ease;
}
.hero p {
  font-size: 24px;
  color: var(--text2);
  font-weight: 400;
  margin-bottom: 12px;
  animation: fadeIn 0.8s ease 0.1s both;
}
.sources-badge {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 8px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 14px;
  color: var(--text3);
  backdrop-filter: blur(40px);
  animation: fadeIn 0.8s ease 0.2s both;
}
.live {
  width: 8px; height: 8px;
  background: var(--success);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--success);
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ── FILTERS ── */
.filters {
  background: var(--surface);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
  margin-bottom: 40px;
  animation: fadeIn 0.8s ease 0.3s both;
  transition: background 0.3s, border-color 0.3s;
}
.filter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 24px;
}
.filter-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 8px;
}
input {
  width: 100%;
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  padding: 14px 16px;
  font-family: inherit;
  font-size: 15px;
  transition: all 0.2s;
  outline: none;
}
[data-theme="light"] input { background: rgba(255,255,255,0.6); }
input:focus {
  background: rgba(0,113,227,0.04);
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
}
input::placeholder { color: var(--text3); }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { display: none; }

.btn {
  padding: 14px 28px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
}
.btn:hover { background: var(--surface-hover); }

/* ── STATS ── */
.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  margin-bottom: 48px;
  animation: fadeIn 0.8s ease 0.4s both;
}
.stat-card {
  background: var(--surface);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--success));
  opacity: 0;
  transition: opacity 0.3s;
}
.stat-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px var(--shadow); }
.stat-card:hover::before { opacity: 1; }
.stat-value {
  font-size: 48px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--text), var(--text2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.stat-label { font-size: 14px; color: var(--text2); font-weight: 500; }

/* ── AO CARDS ── */
.ao-list { display: grid; gap: 20px; }

.ao-list { counter-reset: ao-counter; }

.ao-card {
  background: var(--surface);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 28px 28px 28px 36px;
  transition: all 0.4s;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 12px var(--shadow);
}

/* Barre colorée toujours visible à gauche */
.ao-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 5px; height: 100%;
  background: linear-gradient(180deg, var(--accent), var(--success));
  opacity: 0.35;
  transition: opacity 0.3s;
  border-radius: 20px 0 0 20px;
}

.ao-card:hover {
  transform: translateX(6px) translateY(-3px);
  box-shadow: 0 20px 48px var(--shadow);
  border-color: rgba(0,113,227,0.3);
}
.ao-card:hover::after { opacity: 1; }

.ao-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
  gap: 20px;
}
.ao-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  line-height: 1.3;
  color: var(--text);
}
.ao-client {
  color: var(--text2);
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.badge {
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  background: linear-gradient(135deg, rgba(0,113,227,0.15), rgba(48,209,88,0.15));
  color: var(--accent);
  border: 1px solid rgba(0,113,227,0.3);
}

/* ── BULLES COLORÉES ── */
.ao-bubbles {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}

.bubble {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 10px 16px;
  border-radius: 14px;
  border: 1px solid;
  transition: transform 0.2s, box-shadow 0.2s;
  min-width: 100px;
}
.bubble:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

.bubble-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.7;
}
.bubble-val {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.bubble-ref {
  background: var(--bubble-ref-bg);
  border-color: var(--bubble-ref-border);
  color: var(--bubble-ref-text);
}
.bubble-budget {
  background: var(--bubble-budget-bg);
  border-color: var(--bubble-budget-border);
  color: var(--bubble-budget-text);
}
.bubble-deadline {
  background: var(--bubble-deadline-bg);
  border-color: var(--bubble-deadline-border);
  color: var(--bubble-deadline-text);
}
.bubble-location {
  background: var(--bubble-location-bg);
  border-color: var(--bubble-location-border);
  color: var(--bubble-location-text);
}

/* ao-desc moved to accordion block */
.ao-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  transition: all 0.2s;
}
.ao-link:hover { gap: 12px; }
.ao-no-link { color: var(--text3); font-size: 14px; }


/* ── BARRE DE PROGRESSION ── */
.loading { text-align: center; padding: 80px 40px; }
.loading h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.loading-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }

.progress-outer {
  width: 360px;
  max-width: 90vw;
  height: 6px;
  background: var(--border);
  border-radius: 6px;
  margin: 0 auto 14px;
  overflow: hidden;
}
.progress-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--success));
  border-radius: 6px;
  width: 0%;
  transition: width 0.3s ease;
}
.progress-label {
  font-size: 13px;
  color: var(--text3);
  font-variant-numeric: tabular-nums;
}

/* ── ACCORDÉON DESCRIPTION ── */
.ao-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 0;
  padding: 6px 14px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.ao-toggle-btn:hover {
  background: var(--surface-hover);
  color: var(--text);
  border-color: var(--accent);
}
.ao-toggle-btn .arrow {
  font-size: 11px;
  transition: transform 0.3s ease;
  display: inline-block;
}
.ao-toggle-btn.open .arrow {
  transform: rotate(180deg);
}

.ao-desc-wrap {
  display: none;
  margin-top: 14px;
}
.ao-desc-inner { display: block; }
.ao-desc {
  color: var(--text2);
  line-height: 1.7;
  font-size: 14px;
  padding: 14px 16px;
  background: rgba(0,113,227,0.04);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
}
[data-theme="light"] .ao-desc {
  background: rgba(0,113,227,0.04);
}

.ao-footer {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 18px;
  flex-wrap: wrap;
}


/* ── LOADING ── */
.loading { text-align: center; padding: 100px 40px; }
.spinner {
  width: 60px; height: 60px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading h3 { color: var(--text); font-size: 20px; margin-bottom: 8px; }
.loading-sub { font-size: 14px; color: var(--text2); margin: 6px 0 20px; }
.progress-outer {
  width: 320px; max-width: 80vw; height: 5px;
  background: var(--border2); border-radius: 5px;
  margin: 0 auto 10px; overflow: hidden;
}
.progress-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--success));
  border-radius: 5px; width: 0%;
  transition: width 0.3s ease;
}
.progress-label { font-size: 12px; color: var(--text3); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 32px; right: 32px;
  background: var(--bg2, var(--surface));
  backdrop-filter: blur(40px);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 20px 28px;
  box-shadow: 0 16px 48px var(--shadow);
  transform: translateY(120px);
  opacity: 0;
  transition: all 0.4s;
  z-index: 1000;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── MISC ── */
@keyframes fadeIn {
  from { opacity:0; transform: translateY(30px); }
  to   { opacity:1; transform: translateY(0); }
}
.load-more { text-align: center; padding: 40px; }
.load-more .btn { background: var(--accent); color: white; border-color: var(--accent); }
.load-more .btn:hover { background: #0077ed; }

@media (max-width: 768px) {
  .hero h1 { font-size: 48px; }
  .hero p { font-size: 20px; }
  .container { padding: 0 20px; }
  .filters { padding: 24px; }
  .filter-grid { grid-template-columns: 1fr; }
  .ao-header { flex-direction: column; }
  .stat-value { font-size: 36px; }
  .ao-bubbles { gap: 8px; }
  .bubble { min-width: 80px; padding: 8px 12px; }
  .theme-toggle { top: 14px; left: 14px; padding: 8px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<!-- TOGGLE THÈME -->
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
  <span class="icon" id="themeIcon">☀️</span>
  <span id="themeLabel">Mode clair</span>
</button>

<!-- HERO -->
<div class="hero">
  <h1>AOFinder</h1>
  <p>Appels d'offres informatique</p>
  <div class="sources-badge">
    <div class="live"></div>
    <span>API BOAMP Officielle</span>
  </div>
</div>

<div class="container">

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-grid">
      <div class="filter-group">
        <label>Recherche</label>
        <input type="text" id="search" placeholder="Ex: cloud, cybersécurité..." oninput="debounceSearch()">
      </div>

    </div>
    <button class="btn" onclick="reset()">Réinitialiser</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card"><div class="stat-value" id="tot">-</div><div class="stat-label">Appels d'offres IT</div></div>
    <div class="stat-card"><div class="stat-value" id="rec">-</div><div class="stat-label">MAJ</div></div>
  </div>

  <div id="res"></div>

</div>

<div class="toast" id="toast"></div>

<script>

function extractBudget(f) {
  // FIX: gestion des valeurs décimales et des strings avec espaces
  const m = f.montant || f.valeurestimee || f.montantmarche || 0;
  if (typeof m === 'string') {
    const cleaned = parseFloat(m.replace(/[^0-9.,]/g, '').replace(',', '.'));
    return isNaN(cleaned) ? 0 : Math.round(cleaned);
  }
  return typeof m === 'number' ? Math.round(m) : 0;
}

function displayAO() {
  const container = document.getElementById('res');
  const search = document.getElementById('search').value.toLowerCase().trim();
  const min = 0;
  const max = 999999999;

  const filtered = allAO.filter(ao => {
    if (search && !ao.title.toLowerCase().includes(search) && !ao.description.toLowerCase().includes(search) && !ao.client.toLowerCase().includes(search)) return false;
    if (ao.budget > 0 && ao.budget < min) return false;
    if (ao.budget > 0 && ao.budget > max) return false;
    return true;
  });

  if (!filtered.length) {
    container.innerHTML = '<div class="loading"><h3>Aucun AO trouvé pour ces critères</h3></div>';
    document.getElementById('tot').textContent = '0';
    return;
  }

  // FIX: affiche uniquement la tranche courante (append, pas re-render total)
  const start = displayed;
  const end = Math.min(displayed + PER_PAGE, filtered.length);
  const toShow = filtered.slice(start, end);
  displayed = end;

  // FIX: si premier chargement, crée la liste ; sinon ajoute en bas
  let listEl = container.querySelector('.ao-list');
  if (start === 0) {
    container.innerHTML = '<div class="ao-list"></div>';
    listEl = container.querySelector('.ao-list');
  }

  // Supprime l'ancien bouton "Charger plus" s'il existe
  const oldLoadMore = container.querySelector('.load-more');
  if (oldLoadMore) oldLoadMore.remove();

  toShow.forEach(ao => {
    const card = document.createElement('div');
    card.className = 'ao-card';
    const cardId = 'desc-' + Math.random().toString(36).slice(2,9);

    // Header
    const header = document.createElement('div');
    header.className = 'ao-header';
    header.innerHTML = '<div><div class="ao-title">' + ao.title + '</div><div class="ao-client">🏢 ' + ao.client + '</div></div><div class="badge">📡 ' + ao.source + '</div>';
    card.appendChild(header);

    // Bulles (sans budget)
    const bubbles = document.createElement('div');
    bubbles.className = 'ao-bubbles';
    bubbles.innerHTML =
      '<div class="bubble bubble-ref"><span class="bubble-label">REF</span><span class="bubble-val">' + ao.id + '</span></div>' +
      '<div class="bubble bubble-deadline"><span class="bubble-label">📅 DEADLINE</span><span class="bubble-val">' + fmtD(ao.deadline) + '</span></div>' +
      '<div class="bubble bubble-location"><span class="bubble-label">📍 LIEU</span><span class="bubble-val">' + ao.location + '</span></div>';
    card.appendChild(bubbles);

    // Footer (lien + bouton accordéon)
    const footer = document.createElement('div');
    footer.className = 'ao-footer';

    if (ao.description) {
      const btn = document.createElement('button');
      btn.className = 'ao-toggle-btn';
      btn.id = 'btn-' + cardId;
      btn.innerHTML = '<span class="ao-arrow">▼</span> <span class="ao-label">Objet du marché</span>';
      btn.setAttribute('onclick', 'toggleDesc("' + cardId + '")');
      footer.appendChild(btn);
    }

    if (ao.url) {
      const lien = document.createElement('a');
      lien.href = ao.url;
      lien.target = '_blank';
      lien.rel = 'noopener';
      lien.className = 'ao-link';
      lien.textContent = "Voir l'annonce →";
      footer.appendChild(lien);
    } else {
      const noLink = document.createElement('span');
      noLink.className = 'ao-no-link';
      noLink.textContent = 'Lien non disponible';
      footer.appendChild(noLink);
    }
    card.appendChild(footer);

    // Accordéon description
    if (ao.description) {
      const wrap = document.createElement('div');
      wrap.className = 'ao-desc-wrap';
      wrap.id = 'wrap-' + cardId;
      wrap.innerHTML = '<div class="ao-desc-inner"><div class="ao-desc">' + ao.description + '</div></div>';
      card.appendChild(wrap);
    }
    listEl.appendChild(card);
  });

  // Bouton "Charger plus" si il reste des résultats
  if (displayed < filtered.length) {
    const loadMoreDiv = document.createElement('div');
    loadMoreDiv.className = 'load-more';
    loadMoreDiv.innerHTML = `<button class="btn" onclick="displayAO()">Charger plus (${filtered.length - displayed} restants)</button>`;
    container.appendChild(loadMoreDiv);
  }

  // Met à jour le compteur filtré
  document.getElementById('tot').textContent = filtered.length.toLocaleString('fr-FR');
}

function updateStats(total) {
  document.getElementById('tot').textContent = total.toLocaleString('fr-FR');
  document.getElementById('rec').textContent = new Date().toLocaleDateString('fr-FR');
}

function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    // FIX: reset du compteur avant de re-filtrer
    displayed = 0;
    displayAO();
  }, 400);
}

function reset() {
  document.getElementById('search').value = '';
  displayed = 0;
  loadAO();
}

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', {style: 'currency', currency: 'EUR', maximumFractionDigits: 0}).format(n);
}

function fmtD(d) {
  if (!d || d === 'N/A') return 'N/A';
  try { return new Date(d).toLocaleDateString('fr-FR'); } catch { return d; }
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

window.onload = () => loadAO();

function toggleDesc(id) {
  var wrap = document.getElementById('wrap-' + id);
  var btn  = document.getElementById('btn-' + id);
  if (!wrap || !btn) return;
  if (wrap.style.display === 'block') {
    wrap.style.display = 'none';
    btn.innerHTML = '▼ Objet du marché';
    btn.addEventListener('click', function(){ toggleDesc(id); });
  } else {
    wrap.style.display = 'block';
    btn.innerHTML = '▲ Masquer';
    btn.addEventListener('click', function(){ toggleDesc(id); });
  }
}

</script>


<script>
// ── TOGGLE THÈME ──
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isDark ? 'Mode sombre' : 'Mode clair';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

// Restaure le thème sauvegardé
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  if (saved === 'light') {
    document.getElementById('themeIcon').textContent = '🌙';
    document.getElementById('themeLabel').textContent = 'Mode sombre';
  }
})();
</script>
